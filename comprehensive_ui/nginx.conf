server {
    listen 80;
    server_name _;

    # Serve the React SPA static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths → index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend container.
    # "backend" resolves via Docker Compose internal DNS (service name).
    # Replaces the Vite dev-server proxy defined in vite.config.ts.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # PhoBERT inference can be slow on first request — give it enough time
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }

    # Compress text assets on the way out
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
